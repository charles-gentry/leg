appId: com.art.app
productName: ART
directories:
  buildResources: build
  output: dist-app
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{.eslintrc,.prettierrc,vitest.config.ts}'
asarUnpack:
  - resources/**
  - '**/*.node'
extraResources:
  - from: src/main/r
    to: r
    filter:
      - '**/*.R'
win:
  target: nsis
mac:
  target: dmg
  category: public.app-category.productivity
linux:
  target: AppImage
  category: Science
  icon: build/icon.png
publish:
  provider: github
  owner: charles-gentry
  repo: ART
  # Publish tagged builds as a live release, not a draft (the default), so the
  # in-app auto-updater sees them immediately.
  releaseType: release
